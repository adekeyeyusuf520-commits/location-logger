<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Location Logger</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Location Logger</h1>
    <p>Click the button below to share your current location with the server.</p>

    <button id="sendLocation">Send Current Location</button>
    <div id="status"></div>

    <section>
      <h2>Saved Locations</h2>
      <div id="locations"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
